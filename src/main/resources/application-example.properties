spring.application.name=reservation-app

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/reservation_app
spring.datasource.username=your_db_user
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Custom JWT configuration properties
security.jwt.secret=your_jwt_secret_key_base64_encoded
security.jwt.expiration=3600000
security.jwt.refresh-token.expiration=86400000

# Enable Spring Security debug to see why 403 is returned
logging.level.org.springframework.security=DEBUG

# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_gmail@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
